spring.application.name=tromer

# --- Datasource ---
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/systemfood?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate
# 'update' crea la tabla si no existe y actualiza columnas sin borrar datos.
# Cambiar a 'create' solo si quer\u00c3\u00a9s recrear todo desde cero.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
